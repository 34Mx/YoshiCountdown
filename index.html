<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="color-scheme" content="dark only" />
	<title>Countdown bis 25.07.2026 10:00</title>
	<style>
		:root {
			--bg-1: #07111f;
			--bg-2: #0b1d33;
			--bg-3: #111827;
			--card: rgba(10, 19, 34, 0.72);
			--card-border: rgba(255, 255, 255, 0.12);
			--text: #f5f7fb;
			--muted: rgba(245, 247, 251, 0.72);
			--accent: #7dd3fc;
			--accent-2: #c084fc;
			--accent-3: #34d399;
			--shadow: 0 30px 90px rgba(0, 0, 0, 0.4);
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
		}

		body {
			font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(125, 211, 252, 0.22), transparent 32%),
				radial-gradient(circle at top right, rgba(192, 132, 252, 0.18), transparent 28%),
				radial-gradient(circle at bottom center, rgba(52, 211, 153, 0.12), transparent 26%),
				linear-gradient(145deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
			overflow: hidden;
		}

		.noise {
			position: fixed;
			inset: 0;
			pointer-events: none;
			opacity: 0.06;
			background-image:
				linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
			background-size: 34px 34px;
			mask-image: radial-gradient(circle at center, black 35%, transparent 80%);
		}

		.wrap {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			position: relative;
			isolation: isolate;
		}

		.card {
			width: min(960px, 100%);
			border: 1px solid var(--card-border);
			border-radius: 32px;
			background: var(--card);
			backdrop-filter: blur(18px);
			box-shadow: var(--shadow);
			padding: clamp(24px, 4vw, 44px);
			position: relative;
			overflow: hidden;
		}

		.card::before,
		.card::after {
			content: "";
			position: absolute;
			border-radius: 999px;
			filter: blur(10px);
			opacity: 0.55;
			pointer-events: none;
		}

		.card::before {
			width: 280px;
			height: 280px;
			right: -110px;
			top: -120px;
			background: radial-gradient(circle, rgba(125, 211, 252, 0.28), transparent 70%);
		}

		.card::after {
			width: 240px;
			height: 240px;
			left: -100px;
			bottom: -120px;
			background: radial-gradient(circle, rgba(192, 132, 252, 0.18), transparent 70%);
		}

		.topline {
			display: flex;
			justify-content: space-between;
			gap: 16px;
			align-items: center;
			flex-wrap: wrap;
			margin-bottom: 24px;
			position: relative;
			z-index: 1;
		}

		.eyebrow {
			margin: 0;
			letter-spacing: 0.24em;
			text-transform: uppercase;
			font-size: 0.75rem;
			color: var(--accent);
		}

		.timezone {
			margin: 0;
			color: var(--muted);
			font-size: 0.95rem;
		}

		h1 {
			margin: 10px 0 12px;
			font-size: clamp(2.2rem, 7vw, 5.2rem);
			line-height: 0.94;
			letter-spacing: -0.05em;
			max-width: 10ch;
			position: relative;
			z-index: 1;
		}

		.subtitle {
			margin: 0;
			max-width: 62ch;
			color: var(--muted);
			font-size: clamp(1rem, 2vw, 1.12rem);
			line-height: 1.65;
			position: relative;
			z-index: 1;
		}

		.target {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			margin-top: 18px;
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.08);
			color: rgba(245, 247, 251, 0.9);
			font-size: 0.95rem;
			position: relative;
			z-index: 1;
		}

		.countdown {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 16px;
			margin-top: 34px;
			position: relative;
			z-index: 1;
		}

		.unit {
			padding: 22px 18px 18px;
			border-radius: 24px;
			background: rgba(255, 255, 255, 0.055);
			border: 1px solid rgba(255, 255, 255, 0.09);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
			text-align: center;
		}

		.value {
			display: block;
			font-size: clamp(2.3rem, 6vw, 4.8rem);
			line-height: 0.95;
			font-weight: 800;
			letter-spacing: -0.06em;
			font-variant-numeric: tabular-nums;
		}

		.label {
			display: block;
			margin-top: 12px;
			font-size: 0.82rem;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.status {
			margin-top: 24px;
			display: flex;
			justify-content: space-between;
			gap: 14px;
			flex-wrap: wrap;
			color: var(--muted);
			font-size: 0.95rem;
			position: relative;
			z-index: 1;
		}

		.status strong {
			color: var(--text);
			font-weight: 700;
		}

		.pulse {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: var(--accent-3);
			box-shadow: 0 0 18px rgba(52, 211, 153, 0.85);
			display: inline-block;
			margin-right: 8px;
			animation: pulse 1.4s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { transform: scale(0.85); opacity: 0.7; }
			50% { transform: scale(1.2); opacity: 1; }
		}

		@media (max-width: 760px) {
			body {
				overflow: auto;
			}

			.countdown {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.card {
				border-radius: 26px;
			}
		}

		@media (max-width: 420px) {
			.countdown {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="noise" aria-hidden="true"></div>
	<main class="wrap">
		<section class="card" aria-labelledby="headline">
			<div class="topline">
				<p class="eyebrow">Countdown in deiner lokalen Zeitzone</p>
				<p class="timezone" id="timezone">Zeitzone wird geladen...</p>
			</div>

			<h1 id="headline">Yoshii kommt bald!</h1>
			<p class="subtitle">
				Und zwaaaar:
			</p>

			<div class="countdown" aria-live="polite" aria-atomic="true">
				<div class="unit"><span class="value" id="days">00</span><span class="label">Tage</span></div>
				<div class="unit"><span class="value" id="hours">00</span><span class="label">Stunden</span></div>
				<div class="unit"><span class="value" id="minutes">00</span><span class="label">Minuten</span></div>
				<div class="unit"><span class="value" id="seconds">00</span><span class="label">Sekunden</span></div>
			</div>

			<div class="status">
			</div>
		</section>
	</main>

	<script>
		const target = new Date(2026, 6, 25, 10, 0, 0, 0);
		const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "deine Zeitzone";

		const elements = {
			days: document.getElementById("days"),
			hours: document.getElementById("hours"),
			minutes: document.getElementById("minutes"),
			seconds: document.getElementById("seconds"),
			state: document.getElementById("state"),
			timezone: document.getElementById("timezone"),
			nextUpdate: document.getElementById("next-update"),
		};

		elements.timezone.textContent = `Zeitzone: ${timezone}`;

		function pad(value) {
			return String(value).padStart(2, "0");
		}

		function render() {
			const now = new Date();
			const diff = target - now;

			if (diff <= 0) {
				elements.days.textContent = "00";
				elements.hours.textContent = "00";
				elements.minutes.textContent = "00";
				elements.seconds.textContent = "00";
				elements.state.textContent = "Erreicht";
				document.title = "Countdown beendet";
				return;
			}

			const totalSeconds = Math.floor(diff / 1000);
			const days = Math.floor(totalSeconds / 86400);
			const hours = Math.floor((totalSeconds % 86400) / 3600);
			const minutes = Math.floor((totalSeconds % 3600) / 60);
			const seconds = totalSeconds % 60;

			elements.days.textContent = pad(days);
			elements.hours.textContent = pad(hours);
			elements.minutes.textContent = pad(minutes);
			elements.seconds.textContent = pad(seconds);
			elements.state.textContent = "Live";
			document.title = `${pad(days)}d ${pad(hours)}h ${pad(minutes)}m ${pad(seconds)}s - Countdown`;
		}

		render();
		setInterval(render, 1000);
	</script>
</body>
</html>
